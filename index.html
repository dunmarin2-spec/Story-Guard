<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스토리 가드 Pro (Story Guard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; word-break: keep-all; }
        
        /* 💡 카카오페이 버튼: 어떤 화면에서도 한 줄 유지 및 중앙 정렬 */
        .kakaopay-btn {
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            white-space: nowrap !important;
            max-width: 90vw; /* 화면 폭의 90%를 넘지 않음 */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 💡 쿠팡 배너: PC에선 600px, 모바일에선 100% 자동 조절 */
        #coupangAdContainer {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
        }
        #coupangAdContainer iframe {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body class="py-6 sm:py-10 px-4 text-slate-800">
    <div class="max-w-6xl mx-auto flex flex-col min-h-screen">
        
        <header class="text-center mb-8 sm:mb-12">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-800 flex justify-center items-center gap-2">
                <i data-lucide="shield-check" class="text-blue-600 w-8 h-8 sm:w-10 sm:h-10"></i> 스토리 가드 Pro
            </h1>
            <p class="text-slate-500 mt-2 text-sm sm:text-base px-4 font-medium italic">작가의 설정을 완벽하게 보호합니다</p>
            
            <div class="flex justify-center gap-3 mt-6">
                <button onclick="exportData()" class="flex items-center gap-2 bg-slate-800 text-white px-5 py-2.5 rounded-full text-xs sm:text-sm font-bold hover:bg-black transition shadow-lg active:scale-95">
                    <i data-lucide="download" class="w-4 h-4"></i> 백업
                </button>
                <label class="flex items-center gap-2 bg-white text-slate-700 border border-slate-300 px-5 py-2.5 rounded-full text-xs sm:text-sm font-bold hover:bg-slate-50 transition shadow-sm cursor-pointer active:scale-95">
                    <i data-lucide="upload" class="w-4 h-4"></i> 불러오기
                    <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>
            </div>
        </header>

        <main class="flex-grow">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <section class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
                            <i data-lucide="user-plus" class="w-5 h-5 text-blue-500"></i> 인물 및 관계 등록
                        </h2>
                        <div class="space-y-3">
                            <input id="nameInput" type="text" placeholder="이름" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm">
                            <input id="birthInput" type="number" placeholder="출생 연도" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm">
                            <input id="traitInput" type="text" placeholder="성격 키워드" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm">
                            <button onclick="addChar()" class="w-full bg-blue-600 text-white font-bold p-3 rounded-xl hover:bg-blue-700 transition active:scale-95 mb-4">인물 추가</button>
                            
                            <div class="border-t border-dashed pt-4 mt-4">
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <select id="char1" class="w-full p-2.5 border rounded-lg outline-none text-xs bg-white"></select>
                                    <select id="char2" class="w-full p-2.5 border rounded-lg outline-none text-xs bg-white"></select>
                                </div>
                                <input id="relationType" type="text" placeholder="관계 (예: 라이벌)" class="w-full p-2.5 border rounded-lg outline-none mb-3 text-xs bg-slate-50">
                                <button onclick="addRelation()" class="w-full bg-purple-600 text-white font-bold p-2.5 rounded-xl hover:bg-purple-700 transition active:scale-95 text-sm">관계 연결</button>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="lg:col-span-8 space-y-6">
                    <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
                            <i data-lucide="brain-circuit" class="w-5 h-5 text-green-500"></i> 실시간 설정 검문
                        </h2>
                        <div class="flex flex-wrap sm:flex-nowrap gap-2">
                            <input id="checkName" type="text" placeholder="체크할 인물" class="flex-grow p-3 border rounded-xl outline-none text-sm bg-slate-50">
                            <input id="checkYear" type="number" placeholder="연도" class="w-full sm:w-28 p-3 border rounded-xl outline-none text-sm bg-slate-50">
                            <button onclick="checkLogic()" class="w-full sm:w-auto bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition text-sm">검사</button>
                        </div>
                        <div id="resultBox" class="mt-4 p-4 rounded-xl hidden text-sm font-medium border"></div>
                    </div>

                    <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[400px]">
                        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
                            <i data-lucide="library" class="w-5 h-5 text-amber-500"></i> 등장인물 도감
                        </h2>
                        <div id="charGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </section>
            </div>
        </main>

        <footer class="mt-16 mb-8 text-center border-t border-slate-200 pt-10">
            <div class="mb-12">
                <p class="text-sm font-bold text-slate-600 mb-4 tracking-tight">앱이 마음에 드셨다면?</p>
                <div class="flex justify-center px-4">
                    <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" 
                       class="kakaopay-btn items-center gap-3 bg-[#FAE100] text-[#3C1E1E] px-6 sm:px-10 py-4 rounded-2xl font-bold shadow-lg hover:brightness-95 transition no-underline">
                        <img src="https://developers.kakao.com/assets/img/about/logos/kakaopay/kakao_pay_icon.png" class="w-8 sm:w-10" alt="카카오페이">
                        <span class="text-sm sm:text-base">커피 한 잔 선물하기</span>
                    </a>
                </div>
                <p class="text-[10px] text-slate-400 mt-4 font-semibold italic">후원은 더 좋은 기능을 만듭니다!</p>
            </div>

            <div id="coupangAdContainer" class="rounded-xl shadow-md border border-slate-200 bg-white">
                <p class="text-[10px] text-slate-400 py-1.5 bg-slate-50 font-bold tracking-tight border-bottom border-slate-100 uppercase">오늘의 창작 지원템</p>
                <div class="flex justify-center p-2">
                    <script src="https://ads-partners.coupang.com/g.js"></script>
                    <script>
                        new PartnersCoupang.G({"id":975468,"template":"carousel","trackingCode":"AF4757238","width":"600","height":"150","tsource":""});
                    </script>
                </div>
                <p class="text-[9px] text-slate-400 py-2 bg-slate-50 px-4 leading-tight">
                    "이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다."
                </p>
            </div>
        </footer>
    </div>

    <script>
        let characters = [];
        let relations = [];
        try {
            const savedChars = localStorage.getItem('sg_chars_v3');
            const savedRels = localStorage.getItem('sg_rels_v3');
            if(savedChars) characters = JSON.parse(savedChars);
            if(savedRels) relations = JSON.parse(savedRels);
        } catch (e) { console.error("데이터 로드 에러"); }

        lucide.createIcons();
        renderAll();

        function addChar() {
            const name = document.getElementById('nameInput').value.trim();
            const birth = parseInt(document.getElementById('birthInput').value);
            const trait = document.getElementById('traitInput').value.trim();
            if(!name || isNaN(birth)) return alert("이름과 연도를 입력하세요!");
            characters.push({ name, birth, trait });
            saveData();
            document.getElementById('nameInput').value = '';
            document.getElementById('birthInput').value = '';
            document.getElementById('traitInput').value = '';
            renderAll();
        }

        function addRelation() {
            const c1 = document.getElementById('char1').value;
            const c2 = document.getElementById('char2').value;
            const rel = document.getElementById('relationType').value.trim();
            if(!c1 || !c2 || !rel || c1 === c2) return alert("연결할 인물과 관계를 설정하세요!");
            relations.push({ from: c1, to: c2, type: rel });
            saveData();
            document.getElementById('relationType').value = '';
            renderAll();
        }

        function renderAll() {
            const grid = document.getElementById('charGrid');
            if(characters.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-slate-400 text-center py-20 italic">아직 등록된 인물이 없습니다.</p>';
            } else {
                grid.innerHTML = characters.map((c, idx) => {
                    const myRels = relations.filter(r => r.from === c.name || r.to === c.name);
                    let relHtml = myRels.map(r => {
                        const target = r.from === c.name ? r.to : r.from;
                        return `<div class="text-[11px] bg-white px-2 py-1.5 rounded border border-slate-100 shadow-sm text-slate-600 mb-1 leading-tight"><span class="font-bold text-purple-500">${r.type}</span> ➔ ${target}</div>`;
                    }).join('');
                    return `<div class="p-5 bg-slate-50 border border-slate-200 rounded-2xl group relative text-left hover:border-blue-300 transition-colors shadow-sm">
                                <div class="flex justify-between items-start mb-3">
                                    <div><span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">${c.trait || '일반'}</span><h3 class="text-xl font-extrabold text-slate-800 leading-none mt-1.5">${c.name}</h3><p class="text-[10px] text-slate-400 mt-1.5">${c.birth}년생</p></div>
                                    <button onclick="deleteChar(${idx})" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                </div>
                                <div class="space-y-1 mt-4">${relHtml}</div>
                            </div>`;
                }).join('');
            }
            const s1 = document.getElementById('char1'); const s2 = document.getElementById('char2');
            const options = characters.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            s1.innerHTML = '<option value="">인물 1</option>' + options;
            s2.innerHTML = '<option value="">인물 2</option>' + options;
            lucide.createIcons();
        }

        function checkLogic() {
            const name = document.getElementById('checkName').value.trim();
            const year = parseInt(document.getElementById('checkYear').value);
            const resBox = document.getElementById('resultBox');
            const char = characters.find(c => c.name === name);
            if(!char || isNaN(year)) return alert("등록된 이름과 연도를 입력하세요!");
            const age = year - char.birth;
            resBox.className = "mt-4 p-4 rounded-xl text-sm border"; 
            if(age < 0) {
                resBox.innerHTML = `⚠️ <b>오류:</b> ${name}은 아직 태어나지 않았습니다. (${Math.abs(age)}년 전)`;
                resBox.classList.add('bg-red-50', 'text-red-700', 'border-red-100');
            } else {
                resBox.innerHTML = `✅ <b>정상:</b> ${year}년에 ${name}은 <b>${age}세</b>입니다.`;
                resBox.classList.add('bg-green-50', 'text-green-700', 'border-green-100');
            }
            resBox.classList.remove('hidden');
        }

        function deleteChar(idx) {
            if(!confirm("진짜 삭제하시겠습니까?")) return;
            const name = characters[idx].name;
            characters.splice(idx, 1);
            relations = relations.filter(r => r.from !== name && r.to !== name);
            saveData(); renderAll();
        }

        function saveData() { try { localStorage.setItem('sg_chars_v3', JSON.stringify(characters)); localStorage.setItem('sg_rels_v3', JSON.stringify(relations)); } catch (e) {} }

        function exportData() {
            const dataStr = JSON.stringify({ characters, relations }, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `스토리가드_백업.json`; a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.characters) { characters = data.characters; relations = data.relations || []; saveData(); renderAll(); alert("복구 성공!"); }
                } catch(e) { alert("파일 오류!"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
