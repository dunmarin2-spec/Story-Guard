<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스토리 가드 Pro (Story Guard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        
        /* 💡 카카오페이 버튼: 절대 안 깨지게 고정 */
        .pay-btn {
            background-color: #FAE100;
            color: #3C1E1E;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 800;
            text-decoration: none;
            gap: 8px;
            width: auto;
            min-width: 220px;
            white-space: nowrap; /* 글자 줄바꿈 금지 */
            box-shadow: 0 4px 15px rgba(250, 225, 0, 0.3);
        }

        /* 💡 쿠팡 배너: 폰 화면에 무조건 맞춤 */
        .ad-wrap {
            width: 100%;
            max-width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        #coupang-ad iframe {
            max-width: 100% !important;
        }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-4xl mx-auto flex flex-col min-h-screen">
        
        <div class="flex-grow">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-black text-slate-800 flex justify-center items-center gap-2">
                    <i data-lucide="shield-check" class="text-blue-600"></i> 스토리 가드
                </h1>
                <div class="flex justify-center gap-2 mt-4">
                    <button onclick="exportData()" class="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-bold">백업</button>
                    <label class="bg-white border px-4 py-2 rounded-full text-xs font-bold cursor-pointer">
                        불러오기 <input type="file" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            </header>

            <div class="space-y-6">
                <div class="bg-white p-5 rounded-2xl shadow-sm border">
                    <h2 class="font-bold mb-4 text-slate-700 flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4 text-blue-500"></i> 설정 등록
                    </h2>
                    <input id="nameInput" type="text" placeholder="이름" class="w-full p-3 border rounded-xl mb-2 text-sm bg-slate-50">
                    <input id="birthInput" type="number" placeholder="출생 연도" class="w-full p-3 border rounded-xl mb-2 text-sm bg-slate-50">
                    <input id="traitInput" type="text" placeholder="성격 (예: 냉혈한)" class="w-full p-3 border rounded-xl mb-3 text-sm bg-slate-50">
                    <button onclick="addChar()" class="w-full bg-blue-600 text-white font-bold p-3 rounded-xl">등록하기</button>
                    
                    <div class="border-t mt-4 pt-4 grid grid-cols-2 gap-2">
                        <select id="char1" class="p-2 border rounded-lg text-xs"></select>
                        <select id="char2" class="p-2 border rounded-lg text-xs"></select>
                        <input id="relationType" type="text" placeholder="관계" class="col-span-2 p-2 border rounded-lg text-xs bg-slate-50 mt-1">
                        <button onclick="addRelation()" class="col-span-2 bg-purple-600 text-white p-2 rounded-lg text-xs font-bold mt-1">관계 연결</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border">
                    <h2 class="font-bold mb-4 text-slate-700 flex items-center gap-2 text-black">
                        <i data-lucide="brain-circuit" class="w-4 h-4 text-green-500"></i> 설정 검문
                    </h2>
                    <div class="flex gap-2">
                        <input id="checkName" type="text" placeholder="이름" class="flex-1 p-2 border rounded-lg text-sm bg-slate-50">
                        <input id="checkYear" type="number" placeholder="연도" class="w-20 p-2 border rounded-lg text-sm bg-slate-50">
                        <button onclick="checkLogic()" class="bg-slate-800 text-white px-4 rounded-lg text-xs font-bold">검사</button>
                    </div>
                    <div id="resultBox" class="mt-3 p-3 rounded-lg hidden text-xs font-bold text-black border"></div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border min-h-[200px]">
                    <h2 class="font-bold mb-4 text-slate-700 text-black">📜 등장인물</h2>
                    <div id="charGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-black"></div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center border-t pt-8 pb-10">
            <div class="mb-8 px-4 flex justify-center">
                <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="pay-btn">
                    <span style="font-size: 20px;">P</span> 
                    <span>커피 한 잔 선물하기</span>
                </a>
            </div>

            <div class="ad-wrap">
                <div id="coupang-ad" class="bg-white border rounded-xl overflow-hidden shadow-sm w-full max-w-[600px]">
                    <div class="text-[9px] text-slate-400 py-1 bg-slate-50 border-b">오늘의 추천 지원템</div>
                    <div class="flex justify-center p-1">
                        <script src="https://ads-partners.coupang.com/g.js"></script>
                        <script>
                            new PartnersCoupang.G({"id":975468,"template":"carousel","trackingCode":"AF4757238","width":"100%","height":"140","tsource":""});
                        </script>
                    </div>
                </div>
            </div>
            <p class="text-[8px] text-slate-400 mt-4 leading-tight">
                본 앱은 쿠팡 파트너스 활동으로 소정의 수수료를 제공받을 수 있습니다.
            </p>
        </footer>
    </div>

    <script>
        // 로직 부분 (변경 없음)
        let characters = [];
        let relations = [];
        try {
            const savedChars = localStorage.getItem('sg_chars_v3');
            const savedRels = localStorage.getItem('sg_rels_v3');
            if(savedChars) characters = JSON.parse(savedChars);
            if(savedRels) relations = JSON.parse(savedRels);
        } catch (e) {}
        lucide.createIcons();
        renderAll();

        function addChar() {
            const name = document.getElementById('nameInput').value.trim();
            const birth = parseInt(document.getElementById('birthInput').value);
            const trait = document.getElementById('traitInput').value.trim();
            if(!name || isNaN(birth)) return alert("정보를 입력하세요!");
            characters.push({ name, birth, trait });
            saveData();
            document.getElementById('nameInput').value = '';
            document.getElementById('birthInput').value = '';
            document.getElementById('traitInput').value = '';
            renderAll();
        }

        function addRelation() {
            const c1 = document.getElementById('char1').value;
            const c2 = document.getElementById('char2').value;
            const rel = document.getElementById('relationType').value.trim();
            if(!c1 || !c2 || !rel || c1 === c2) return alert("설정 확인!");
            relations.push({ from: c1, to: c2, type: rel });
            saveData();
            document.getElementById('relationType').value = '';
            renderAll();
        }

        function renderAll() {
            const grid = document.getElementById('charGrid');
            if(characters.length === 0) { grid.innerHTML = '<p class="text-slate-400 text-center py-10 text-xs">등록된 인물이 없습니다.</p>'; }
            else {
                grid.innerHTML = characters.map((c, idx) => {
                    const myRels = relations.filter(r => r.from === c.name || r.to === c.name);
                    let relHtml = myRels.map(r => {
                        const target = r.from === c.name ? r.to : r.from;
                        return `<div class="text-[10px] bg-white px-2 py-1 rounded border border-slate-100 mb-1 text-black"><span class="font-bold text-purple-500">${r.type}</span> ➔ ${target}</div>`;
                    }).join('');
                    return `<div class="p-4 bg-slate-50 border rounded-xl relative text-left mb-2">
                                <div class="flex justify-between items-start">
                                    <div><span class="text-[9px] font-bold text-blue-500 uppercase">${c.trait || '일반'}</span><h3 class="text-base font-bold text-slate-800 text-black">${c.name}</h3><p class="text-[9px] text-slate-400">${c.birth}년생</p></div>
                                    <button onclick="deleteChar(${idx})" class="text-slate-300"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                </div>
                                <div class="mt-2">${relHtml}</div>
                            </div>`;
                }).join('');
            }
            const s1 = document.getElementById('char1'); const s2 = document.getElementById('char2');
            const options = characters.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            s1.innerHTML = '<option value="">인물 1</option>' + options;
            s2.innerHTML = '<option value="">인물 2</option>' + options;
            lucide.createIcons();
        }

        function checkLogic() {
            const name = document.getElementById('checkName').value.trim();
            const year = parseInt(document.getElementById('checkYear').value);
            const resBox = document.getElementById('resultBox');
            const char = characters.find(c => c.name === name);
            if(!char || isNaN(year)) return alert("입력 오류!");
            const age = year - char.birth; resBox.className = "mt-3 p-3 rounded-lg text-xs font-bold border text-black"; 
            if(age < 0) { resBox.innerHTML = `⚠️ <b>오류:</b> ${name}은 아직 태어나지 않았습니다.`; resBox.classList.add('bg-red-50', 'text-red-600', 'border-red-100'); }
            else { resBox.innerHTML = `✅ <b>정상:</b> ${year}년에 ${name}은 <b>${age}세</b>입니다.`; resBox.classList.add('bg-green-50', 'text-green-600', 'border-green-100'); }
            resBox.classList.remove('hidden');
        }

        function deleteChar(idx) {
            if(!confirm("삭제?")) return;
            const name = characters[idx].name; characters.splice(idx, 1);
            relations = relations.filter(r => r.from !== name && r.to !== name);
            saveData(); renderAll();
        }

        function saveData() { localStorage.setItem('sg_chars_v3', JSON.stringify(characters)); localStorage.setItem('sg_rels_v3', JSON.stringify(relations)); }
        function exportData() {
            const dataStr = JSON.stringify({ characters, relations }, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `백업.json`; a.click();
        }
        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                if (data.characters) { characters = data.characters; relations = data.relations || []; saveData(); renderAll(); alert("복구 완료!"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
